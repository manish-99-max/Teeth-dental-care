<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dr. Teeth Dental Clinic — Jorhat, Assam</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --sage: #5c7a6b;
    --sage-light: #8aab98;
    --sage-dark: #3d5449;
    --cream: #f5f0e8;
    --cream-dark: #ede7d9;
    --ivory: #faf8f4;
    --charcoal: #1c1c1e;
    --charcoal-mid: #2e2e30;
    --gold: #c8a96e;
    --gold-light: #dfc090;
    --text-muted: #6b6b6e;
    --text-light: #9a9a9d;
    --white: #ffffff;
    --nav-h: 72px;
  }

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  html { scroll-behavior: smooth; font-size: 16px; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--ivory);
    color: var(--charcoal);
    cursor: none;
    overflow-x: hidden;
  }

  /* ── CUSTOM CURSOR ── */
  #cursor {
    width: 12px; height: 12px;
    background: var(--sage);
    border-radius: 50%;
    position: fixed;
    top: 0; left: 0;
    pointer-events: none;
    z-index: 9999;
    transition: transform 0.15s ease, background 0.2s;
    mix-blend-mode: multiply;
  }
  #cursor-ring {
    width: 40px; height: 40px;
    border: 1.5px solid var(--sage);
    border-radius: 50%;
    position: fixed;
    top: 0; left: 0;
    pointer-events: none;
    z-index: 9998;
    transition: transform 0.4s cubic-bezier(0.23,1,0.32,1), opacity 0.3s, width 0.3s, height 0.3s, border-color 0.2s;
    opacity: 0.6;
  }
  body.cursor-hover #cursor { transform: translate(-50%,-50%) scale(2.5); background: var(--gold); }
  body.cursor-hover #cursor-ring { width: 60px; height: 60px; border-color: var(--gold); opacity: 0.3; }

  @media (hover: none) {
    #cursor, #cursor-ring { display: none; }
    body { cursor: auto; }
  }

  /* ── NAVIGATION ── */
  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: var(--nav-h);
    z-index: 1000;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 3rem;
    transition: background 0.4s, box-shadow 0.4s;
  }
  nav.scrolled {
    background: rgba(250,248,244,0.95);
    backdrop-filter: blur(12px);
    box-shadow: 0 1px 30px rgba(28,28,30,0.08);
  }

  .nav-logo {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.35rem;
    font-weight: 600;
    color: var(--charcoal);
    letter-spacing: 0.02em;
    text-decoration: none;
    display: flex;
    flex-direction: column;
    line-height: 1.1;
  }
  .nav-logo span { font-size: 0.65rem; font-family: 'DM Sans', sans-serif; font-weight: 300; letter-spacing: 0.15em; color: var(--sage); text-transform: uppercase; }

  .nav-links { display: flex; gap: 2.5rem; align-items: center; }
  .nav-links a {
    font-size: 0.82rem;
    font-weight: 400;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--charcoal);
    text-decoration: none;
    position: relative;
    transition: color 0.2s;
  }
  .nav-links a::after {
    content: '';
    position: absolute;
    bottom: -3px; left: 0;
    width: 0; height: 1px;
    background: var(--gold);
    transition: width 0.3s ease;
  }
  .nav-links a:hover::after { width: 100%; }
  .nav-links a:hover { color: var(--sage-dark); }

  .nav-cta {
    background: var(--sage);
    color: var(--white) !important;
    padding: 0.6rem 1.4rem;
    border-radius: 2px;
    transition: background 0.2s !important;
  }
  .nav-cta:hover { background: var(--sage-dark) !important; }
  .nav-cta::after { display: none !important; }

  .hamburger { display: none; flex-direction: column; gap: 5px; cursor: pointer; padding: 4px; }
  .hamburger span { display: block; width: 24px; height: 1.5px; background: var(--charcoal); transition: 0.3s; }

  /* ── HERO ── */
  #hero {
    min-height: 100vh;
    display: grid;
    grid-template-columns: 1fr 1fr;
    position: relative;
    overflow: hidden;
    background: var(--charcoal);
  }

  .hero-left {
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 8rem 4rem 4rem 5rem;
    position: relative;
    z-index: 2;
  }

  .hero-badge {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    font-size: 0.72rem;
    font-weight: 500;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 1.8rem;
  }
  .hero-badge::before {
    content: '';
    display: inline-block;
    width: 30px;
    height: 1px;
    background: var(--gold);
  }

  .hero-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(3rem, 6vw, 5.5rem);
    font-weight: 300;
    line-height: 1.05;
    color: var(--cream);
    margin-bottom: 1.5rem;
  }
  .hero-title em {
    font-style: italic;
    color: var(--gold-light);
    display: block;
  }

  .hero-desc {
    font-size: 0.95rem;
    line-height: 1.8;
    color: var(--text-light);
    max-width: 380px;
    margin-bottom: 2.5rem;
    font-weight: 300;
  }

  .hero-actions { display: flex; gap: 1rem; align-items: center; flex-wrap: wrap; }

  .btn-primary {
    background: var(--gold);
    color: var(--charcoal);
    padding: 0.9rem 2rem;
    font-size: 0.82rem;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    text-decoration: none;
    border-radius: 2px;
    transition: background 0.2s, transform 0.2s;
    display: inline-block;
  }
  .btn-primary:hover { background: var(--gold-light); transform: translateY(-2px); }

  .btn-outline {
    border: 1px solid rgba(255,255,255,0.25);
    color: var(--cream);
    padding: 0.9rem 2rem;
    font-size: 0.82rem;
    font-weight: 400;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    text-decoration: none;
    border-radius: 2px;
    transition: border-color 0.2s, color 0.2s;
    display: inline-block;
  }
  .btn-outline:hover { border-color: var(--gold); color: var(--gold); }

  .hero-stats {
    display: flex;
    gap: 2.5rem;
    margin-top: 3.5rem;
    padding-top: 2rem;
    border-top: 1px solid rgba(255,255,255,0.1);
  }
  .stat-item { display: flex; flex-direction: column; gap: 0.2rem; }
  .stat-num {
    font-family: 'Cormorant Garamond', serif;
    font-size: 2rem;
    font-weight: 600;
    color: var(--gold-light);
    line-height: 1;
  }
  .stat-label { font-size: 0.72rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-light); }

  .hero-right {
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .hero-img-bg {
    position: absolute;
    inset: 0;
    background:
      linear-gradient(135deg, var(--sage-dark) 0%, #2a4338 40%, #1c2e28 100%);
  }

  .hero-img-pattern {
    position: absolute;
    inset: 0;
    opacity: 0.04;
    background-image: repeating-linear-gradient(
      45deg,
      transparent,
      transparent 20px,
      rgba(255,255,255,0.8) 20px,
      rgba(255,255,255,0.8) 21px
    );
  }

  .hero-card {
    position: relative;
    z-index: 2;
    background: rgba(250,248,244,0.07);
    border: 1px solid rgba(200,169,110,0.2);
    backdrop-filter: blur(20px);
    border-radius: 4px;
    padding: 3rem;
    max-width: 320px;
    text-align: center;
  }

  .hero-icon {
    width: 70px;
    height: 70px;
    background: var(--gold);
    border-radius: 50%;
    margin: 0 auto 1.5rem;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.8rem;
  }

  .hero-card-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.6rem;
    font-weight: 400;
    color: var(--cream);
    margin-bottom: 0.5rem;
  }

  .hero-card-sub {
    font-size: 0.8rem;
    color: var(--text-light);
    letter-spacing: 0.05em;
    margin-bottom: 1.5rem;
  }

  .stars {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 3px;
    margin-bottom: 0.5rem;
  }
  .star { color: var(--gold); font-size: 1rem; }
  .rating-text { font-size: 0.8rem; color: var(--gold-light); letter-spacing: 0.05em; }

  .hero-decor {
    position: absolute;
    bottom: 2rem;
    right: 2rem;
    width: 120px;
    height: 120px;
    border: 1px solid rgba(200,169,110,0.15);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .hero-decor::after {
    content: '';
    width: 90px; height: 90px;
    border: 1px solid rgba(200,169,110,0.1);
    border-radius: 50%;
    position: absolute;
  }

  /* Floating cross elements */
  .float-cross {
    position: absolute;
    opacity: 0.06;
    font-size: 5rem;
    color: var(--cream);
    animation: floatY 8s ease-in-out infinite;
    user-select: none;
  }
  .float-cross:nth-child(1) { top: 15%; right: 8%; animation-delay: 0s; }
  .float-cross:nth-child(2) { bottom: 25%; left: 5%; font-size: 3rem; animation-delay: 3s; }

  @keyframes floatY {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-15px); }
  }

  /* ── GOOGLE RATING BANNER ── */
  .rating-banner {
    background: var(--sage);
    color: var(--white);
    text-align: center;
    padding: 0.9rem 2rem;
    font-size: 0.85rem;
    letter-spacing: 0.05em;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 1.5rem;
    flex-wrap: wrap;
  }
  .rating-banner .stars-inline { display: flex; gap: 2px; }
  .rating-banner .star { font-size: 0.9rem; }
  .rating-banner strong { font-weight: 500; }

  /* ── SECTION BASE ── */
  section { position: relative; }

  .section-label {
    font-size: 0.7rem;
    font-weight: 500;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--sage);
    margin-bottom: 1rem;
    display: flex;
    align-items: center;
    gap: 0.8rem;
  }
  .section-label::before {
    content: '';
    width: 30px;
    height: 1px;
    background: var(--sage);
  }

  .section-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(2.2rem, 4vw, 3.5rem);
    font-weight: 300;
    line-height: 1.15;
    color: var(--charcoal);
    margin-bottom: 1.2rem;
  }
  .section-title em { font-style: italic; color: var(--sage); }

  .section-text {
    font-size: 0.95rem;
    line-height: 1.85;
    color: var(--text-muted);
    font-weight: 300;
    max-width: 520px;
  }

  /* ── ABOUT ── */
  #about {
    padding: 7rem 5rem;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6rem;
    align-items: center;
    background: var(--ivory);
  }

  .about-visual {
    position: relative;
  }

  .about-img-box {
    background: linear-gradient(135deg, var(--sage-dark), var(--sage));
    border-radius: 3px;
    height: 480px;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }

  .about-img-box::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 40px,
      rgba(255,255,255,0.03) 40px,
      rgba(255,255,255,0.03) 41px
    );
  }

  .about-center-icon {
    font-size: 5rem;
    opacity: 0.4;
    position: relative;
    z-index: 1;
  }

  .about-tag {
    position: absolute;
    right: -2rem;
    bottom: 3rem;
    background: var(--gold);
    color: var(--charcoal);
    padding: 1.5rem;
    border-radius: 3px;
    text-align: center;
    box-shadow: 0 10px 40px rgba(200,169,110,0.3);
    min-width: 140px;
  }
  .about-tag-num {
    font-family: 'Cormorant Garamond', serif;
    font-size: 2.2rem;
    font-weight: 600;
    line-height: 1;
    color: var(--charcoal);
  }
  .about-tag-label { font-size: 0.72rem; letter-spacing: 0.1em; text-transform: uppercase; }

  .about-accent {
    position: absolute;
    top: -1.5rem;
    left: -1.5rem;
    width: 80px;
    height: 80px;
    border: 2px solid var(--sage-light);
    border-radius: 50%;
    opacity: 0.4;
  }

  .about-content { }
  .about-features {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1rem;
    margin-top: 2rem;
  }
  .about-feat {
    padding: 1.2rem;
    background: var(--cream);
    border-radius: 3px;
    border-left: 3px solid var(--sage);
  }
  .about-feat-title { font-weight: 500; font-size: 0.88rem; color: var(--charcoal); margin-bottom: 0.3rem; }
  .about-feat-text { font-size: 0.8rem; color: var(--text-muted); line-height: 1.5; }

  /* ── SERVICES ── */
  #services {
    padding: 7rem 5rem;
    background: var(--charcoal);
  }

  .services-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    margin-bottom: 4rem;
    flex-wrap: wrap;
    gap: 2rem;
  }
  .services-header .section-title { color: var(--cream); }
  .services-header .section-label { color: var(--sage-light); }
  .services-header .section-label::before { background: var(--sage-light); }

  .services-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1.5px;
  }

  .service-card {
    background: var(--charcoal-mid);
    padding: 2.5rem;
    position: relative;
    overflow: hidden;
    transition: background 0.3s;
    cursor: default;
  }
  .service-card::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0;
    width: 0; height: 2px;
    background: var(--gold);
    transition: width 0.4s ease;
  }
  .service-card:hover::after { width: 100%; }
  .service-card:hover { background: #272727; }

  .service-icon {
    font-size: 2rem;
    margin-bottom: 1.5rem;
    display: block;
    opacity: 0.8;
  }

  .service-num {
    position: absolute;
    top: 1.5rem;
    right: 1.5rem;
    font-family: 'Cormorant Garamond', serif;
    font-size: 3rem;
    font-weight: 300;
    color: rgba(255,255,255,0.04);
    line-height: 1;
  }

  .service-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.4rem;
    font-weight: 400;
    color: var(--cream);
    margin-bottom: 0.8rem;
  }

  .service-desc {
    font-size: 0.85rem;
    color: var(--text-light);
    line-height: 1.75;
    font-weight: 300;
  }

  .service-link {
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    margin-top: 1.5rem;
    font-size: 0.78rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--sage-light);
    text-decoration: none;
    transition: gap 0.2s, color 0.2s;
  }
  .service-link:hover { gap: 0.8rem; color: var(--gold); }

  /* ── GALLERY ── */
  #gallery {
    padding: 7rem 5rem;
    background: var(--cream);
  }

  .gallery-header { text-align: center; margin-bottom: 4rem; }
  .gallery-header .section-label { justify-content: center; }
  .gallery-header .section-label::before { display: none; }
  .gallery-header .section-title { margin: 0 auto; }

  .gallery-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    grid-template-rows: 200px 200px;
    gap: 1rem;
  }

  .gallery-item {
    border-radius: 3px;
    overflow: hidden;
    position: relative;
    cursor: pointer;
  }

  .gallery-item:nth-child(1) { grid-column: span 2; grid-row: span 2; }
  .gallery-item:nth-child(4) { grid-column: span 2; }

  .gallery-inner {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    transition: transform 0.5s ease;
    font-size: 3rem;
    color: rgba(255,255,255,0.3);
  }

  .gallery-item:hover .gallery-inner { transform: scale(1.05); }

  .gallery-overlay {
    position: absolute;
    inset: 0;
    background: rgba(28,28,30,0.55);
    opacity: 0;
    transition: opacity 0.3s;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .gallery-item:hover .gallery-overlay { opacity: 1; }
  .gallery-overlay-text {
    color: var(--white);
    font-size: 0.78rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }

  .g1 { background: linear-gradient(135deg, #3d5449 0%, #5c7a6b 100%); }
  .g2 { background: linear-gradient(135deg, #2e3f37 0%, #4a6358 100%); }
  .g3 { background: linear-gradient(135deg, #c8a96e 0%, #dfc090 100%); }
  .g4 { background: linear-gradient(135deg, #1c1c1e 0%, #2e2e30 100%); }
  .g5 { background: linear-gradient(135deg, #5c7a6b 0%, #3d5449 100%); }

  /* ── TESTIMONIALS ── */
  #testimonials {
    padding: 7rem 5rem;
    background: var(--ivory);
    overflow: hidden;
  }

  .testimonials-header { text-align: center; margin-bottom: 4rem; }
  .testimonials-header .section-label { justify-content: center; }
  .testimonials-header .section-label::before { display: none; }

  .rating-highlight {
    display: inline-flex;
    align-items: center;
    gap: 1rem;
    background: var(--sage);
    color: var(--white);
    padding: 0.8rem 1.8rem;
    border-radius: 2rem;
    margin-bottom: 2.5rem;
    font-size: 0.85rem;
    font-weight: 400;
  }
  .rating-highlight .stars { margin: 0; gap: 2px; }
  .rating-highlight .star { font-size: 0.85rem; color: var(--gold-light); }

  .testimonials-track {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1.5rem;
  }

  .testimonial-card {
    background: var(--white);
    padding: 2rem;
    border-radius: 3px;
    border: 1px solid var(--cream-dark);
    position: relative;
    transition: box-shadow 0.3s, transform 0.3s;
  }
  .testimonial-card:hover { box-shadow: 0 10px 40px rgba(92,122,107,0.12); transform: translateY(-4px); }

  .testimonial-quote {
    font-family: 'Cormorant Garamond', serif;
    font-size: 3rem;
    line-height: 0.5;
    color: var(--sage-light);
    margin-bottom: 1rem;
    opacity: 0.4;
  }

  .testimonial-text {
    font-size: 0.9rem;
    line-height: 1.8;
    color: var(--text-muted);
    font-weight: 300;
    font-style: italic;
    margin-bottom: 1.5rem;
  }

  .testimonial-author {
    display: flex;
    align-items: center;
    gap: 0.8rem;
  }
  .author-avatar {
    width: 38px; height: 38px;
    background: var(--sage);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.9rem;
    color: var(--white);
    font-weight: 500;
  }
  .author-name { font-weight: 500; font-size: 0.88rem; color: var(--charcoal); }
  .author-loc { font-size: 0.75rem; color: var(--text-light); }

  .testimonial-stars { display: flex; gap: 2px; margin-bottom: 0.8rem; }
  .testimonial-stars .star { font-size: 0.8rem; color: var(--gold); }

  /* ── CONTACT ── */
  #contact {
    padding: 7rem 5rem;
    background: var(--charcoal);
    display: grid;
    grid-template-columns: 1fr 1.2fr;
    gap: 6rem;
    align-items: start;
  }

  .contact-info .section-title { color: var(--cream); }
  .contact-info .section-label { color: var(--sage-light); }
  .contact-info .section-label::before { background: var(--sage-light); }
  .contact-info .section-text { color: var(--text-light); max-width: none; }

  .contact-details {
    margin-top: 3rem;
    display: flex;
    flex-direction: column;
    gap: 1.5rem;
  }

  .contact-item {
    display: flex;
    gap: 1rem;
    align-items: flex-start;
  }

  .contact-icon-box {
    width: 44px;
    height: 44px;
    background: rgba(92,122,107,0.15);
    border: 1px solid rgba(138,171,152,0.2);
    border-radius: 2px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.1rem;
    flex-shrink: 0;
    margin-top: 2px;
  }
